  pl: { valueSales: 34.1, valueSalesYA: 31.8, volSales:29.4,  volSalesYA:28.7,  numDist:52.1, wtdDist:61.4, pricePerUnit:1.16, pricePerUnitYA:1.10, numStores:2980, appsUnits:4.4,  valueShare:10.7 },

  sa: { valueSales: 11.4, valueSalesYA: 10.3, volSales: 8.9,  volSalesYA: 8.4,  numDist:41.7, wtdDist:49.6, pricePerUnit:1.28, pricePerUnitYA:1.21, numStores: 980, appsUnits:3.7,  valueShare: 7.9 },
};

// Trend sparkline data (6 prior periods, index 0 = oldest)
const SPARKLINES = {
  uk: [112.1,114.8,116.2,118.2,121.4,124.8],
  de: [101.2,103.4,104.8,107.9,110.1,112.3],
  fr: [70.1, 71.8, 72.4, 74.1, 76.2, 78.6],

  nl: [34.9, 35.8, 36.4, 37.4, 38.6, 39.7],
  pl: [29.1, 30.2, 30.8, 31.8, 33.1, 34.1],
  ae: [22.4, 23.1, 24.2, 25.9, 26.8, 28.3],

// ─── HELPERS ────────────────────────────────────────────────────────────────
function getStatus(market, day) {
  if (day >= market.lagDays) return 'LANDED';
  if (market.lagDays > SLA_DAY) return 'AT RISK';
  return 'PENDING';
}
function statusColor(s) {
  return s === 'LANDED' ? '#43AA8B' : s === 'AT RISK' ? '#F07167' : '#F4A261';
}
function fmt(n, decimals=1) { return n == null ? '-' : n.toFixed(decimals); }
function fmtM(n) { return n == null ? '-' : n >= 1000 ? (n/1000).toFixed(1)+'B' : n.toFixed(1)+'M'; }
function pctChange(curr, ya) { return ((curr - ya) / ya * 100); }
function pctColor(v) { return v >= 0 ? '#43AA8B' : '#F07167'; }
function pctArrow(v) { return v >= 0 ? '▲' : '▼'; }

// ─── KPI COMPUTATION ENGINE ──────────────────────────────────────────────────
function computeKPIs(day) {
  const landed = MARKETS.filter(m => day >= m.lagDays);
  const landedWeight = landed.reduce((s,m) => s + m.weight, 0);
  const completeness = landedWeight / TOTAL_WEIGHT;

  if (landed.length === 0) return { landed, completeness, kpis: null, perMarket: [] };

  // Weighted aggregates across landed markets
  let valueSales=0, valueSalesYA=0, volSales=0, volSalesYA=0;
  let numDistSum=0, wtdDistSum=0, priceNum=0, priceDen=0;
  let totalStores=0, totalSKULocations=0;
  let valueSalesForShare=0;

  for (const m of landed) {
    const d = MARKET_DATA[m.id];
    valueSales    += d.valueSales;
    valueSalesYA  += d.valueSalesYA;
    volSales      += d.volSales;
    volSalesYA    += d.volSalesYA;
    numDistSum    += d.numDist * m.weight;
    wtdDistSum    += d.wtdDist * m.weight;
    priceNum      += d.pricePerUnit * d.valueSales;  // value-weighted price
    priceDen      += d.valueSales;
    totalStores   += d.numStores;
    totalSKULocations += d.numStores * d.appsUnits;
    valueSalesForShare += d.valueSales;
  }

  const numDist    = numDistSum / landedWeight;
  const wtdDist    = wtdDistSum / landedWeight;
  const pricePerUnit = priceNum / priceDen;
  const apps       = totalSKULocations / totalStores;  // avg SKUs per stocking store
  const sppd       = (valueSales * 1e6) / (totalStores * numDist / 100);  // value per point of dist

  // SPPD YA (approx)
  let priceNumYA=0, priceDenYA=0, sppdDenYA=0, valueSalesYAForSppd=0;
  for (const m of landed) {
    const d = MARKET_DATA[m.id];
    priceNumYA += d.pricePerUnitYA * d.valueSalesYA;
    priceDenYA += d.valueSalesYA;
    sppdDenYA  += d.numStores * d.numDist / 100;
    valueSalesYAForSppd += d.valueSalesYA;
  }
  const pricePerUnitYA = priceNumYA / priceDenYA;
  const sppdYA = (valueSalesYAForSppd * 1e6) / sppdDenYA;

  // Value share - weighted avg across landed markets
  let vsShare=0;
  for (const m of landed) vsShare += MARKET_DATA[m.id].valueShare * m.weight;
  vsShare = vsShare / landedWeight;

  const kpis = {
    valueSales, valueSalesYA,
    volSales, volSalesYA,
    numDist, wtdDist,
    pricePerUnit, pricePerUnitYA,
    apps,
    sppd, sppdYA,
    valueShare: vsShare,
    valueShareYA: vsShare - 0.4,  // simulated YA share
  };

  // Per-market contribution rows
  const perMarket = MARKETS.map(m => ({
    ...m,
    status: getStatus(m, day),
    data: MARKET_DATA[m.id],
    landed: day >= m.lagDays,
    contributionPct: day >= m.lagDays ? (MARKET_DATA[m.id].valueSales / valueSales * 100) : null,
  }));

  return { landed, completeness, kpis, perMarket };
}

// ─── SPARKLINE SVG ───────────────────────────────────────────────────────────
function Sparkline({ data, color='#00B4D8', width=80, height=28 }) {
  const min = Math.min(...data), max = Math.max(...data);
  const range = max - min || 1;
  const pts = data.map((v,i) => {
    const x = (i / (data.length-1)) * width;
    const y = height - ((v-min)/range) * (height-4) - 2;
    return `${x},${y}`;
  }).join(' ');
  const areaClose = `${width},${height} 0,${height}`;
  return (
    <svg width={width} height={height} style={{display:'block'}}>
      <polyline points={pts+' '+areaClose} fill={color} fillOpacity="0.12" stroke="none"/>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
      <circle cx={data.map((v,i)=>(i/(data.length-1))*width).slice(-1)[0]}
              cy={height - ((data[data.length-1]-min)/range)*(height-4) - 2}
              r="2.5" fill={color}/>
    </svg>
  );
}

// ─── KPI CARD ────────────────────────────────────────────────────────────────
function KPICard({ label, value, unit='', ya, yaLabel='vs YA', color='#00B4D8', sparkData, format='dec', isProvisional, tooltip }) {
  const change = ya != null ? pctChange(value, ya) : null;
  const displayVal = value == null ? null :
    format === 'M' ? fmtM(value) :
    format === 'dec2' ? fmt(value,2) :
    format === 'int' ? Math.round(value).toLocaleString() :
    fmt(value,1);

  return (
    <div className="kpi-animate" style={{
      background:'rgba(13,24,48,0.9)',
      border:`1px solid ${isProvisional ? 'rgba(244,162,97,0.3)' : 'rgba(0,180,216,0.18)'}`,
      borderRadius:10, padding:'16px 18px', position:'relative', overflow:'hidden'
    }}>
      {isProvisional && (
        <div style={{position:'absolute',top:8,right:8}}>
          <span style={{fontSize:9,fontWeight:700,color:'#F4A261',background:'rgba(244,162,97,0.12)',border:'1px solid rgba(244,162,97,0.3)',borderRadius:4,padding:'1px 5px',textTransform:'uppercase',letterSpacing:'0.05em'}}>PROV</span>
        </div>
      )}
      <div style={{fontSize:10,color:'#64748B',fontWeight:600,textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:6}}>{label}</div>
      {value == null ? (
        <div className="pending-pulse" style={{fontSize:20,fontWeight:800,color:'#1C3A5E',marginBottom:4}}>-</div>
      ) : (
        <div style={{display:'flex',alignItems:'baseline',gap:4,marginBottom:4}}>
          <span style={{fontSize:22,fontWeight:800,color,lineHeight:1}}>{displayVal}</span>
          {unit && <span style={{fontSize:12,color:'#64748B',fontWeight:500}}>{unit}</span>}
        </div>
      )}
      {change != null && value != null && (
        <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:6}}>
          <span style={{fontSize:12,fontWeight:700,color:pctColor(change)}}>{pctArrow(change)} {Math.abs(change).toFixed(1)}%</span>
          <span style={{fontSize:11,color:'#64748B'}}>{yaLabel}</span>
        </div>
      )}
      {sparkData && value != null && (
        <div style={{marginTop:4}}>
          <Sparkline data={sparkData} color={color}/>
        </div>
      )}
      {value == null && (
        <div style={{fontSize:11,color:'#374151',marginTop:4}}>Awaiting data</div>
      )}
    </div>
  );
}

// ─── CONTRIBUTION BAR ────────────────────────────────────────────────────────
function ContribBar({ perMarket }) {
  const total = perMarket.filter(m=>m.landed).reduce((s,m)=>s+m.data.valueSales,0);
  return (
    <div>
      <div style={{display:'flex',height:20,borderRadius:6,overflow:'hidden',marginBottom:8}}>
        {perMarket.map(m => {
          const pct = m.landed ? (m.data.valueSales/total*100) : 0;
          const colors = {uk:'#00B4D8',de:'#48CAE4',fr:'#0096C7',it:'#90E0EF',es:'#43AA8B',nl:'#F9C74F',pl:'#F4A261',ae:'#F07167',za:'#C3A6FF',sa:'#94A3B8'};
          if (!m.landed) return null;
          return <div key={m.id} style={{width:`${pct}%`,background:colors[m.id],transition:'width 0.5s ease'}} title={`${m.name}: ${pct.toFixed(1)}%`}/>;
        })}
        {/* Pending grey */}
        {perMarket.filter(m=>!m.landed).map(m => (
          <div key={m.id} style={{flex:1,background:'rgba(255,255,255,0.04)',borderLeft:'1px solid rgba(255,255,255,0.03)'}}/>
        ))}
      </div>
      <div style={{display:'flex',flexWrap:'wrap',gap:'6px 12px'}}>
        {perMarket.filter(m=>m.landed).map(m => {
          const pct = m.data.valueSales/total*100;
          const colors = {uk:'#00B4D8',de:'#48CAE4',fr:'#0096C7',it:'#90E0EF',es:'#43AA8B',nl:'#F9C74F',pl:'#F4A261',ae:'#F07167',za:'#C3A6FF',sa:'#94A3B8'};
          return (
            <span key={m.id} style={{fontSize:10,color:'#94A3B8',display:'flex',alignItems:'center',gap:4}}>
              <span style={{width:7,height:7,borderRadius:'50%',background:colors[m.id],display:'inline-block'}}/>
              {m.short} {pct.toFixed(0)}%
            </span>
          );
        })}
        {perMarket.filter(m=>!m.landed).map(m => (
          <span key={m.id} style={{fontSize:10,color:'#374151',display:'flex',alignItems:'center',gap:4}}>
            <span style={{width:7,height:7,borderRadius:'50%',background:'rgba(255,255,255,0.08)',display:'inline-block'}}/>
            {m.short} -
          </span>
        ))}
      </div>
    </div>
  );
}

        </thead>

              <tr key={m.id} style={{borderBottom:'1px solid rgba(255,255,255,0.03)',opacity:m.landed?1:0.35,transition:'opacity 0.4s ease'}}>

                    {m.status}

                {m.landed ? <>

}

// ─── GENIE RESPONSE ──────────────────────────────────────────────────────────
function GenieResponse({ day, completeness, landed, kpis }) {
  const pct = Math.round(completeness * 100);
  if (landed.length === 0) {
    return (
      <div style={{background:'rgba(13,24,48,0.9)',border:'1px solid rgba(0,180,216,0.15)',borderRadius:10,padding:20}}>
        <div style={{fontSize:10,color:'#00B4D8',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.12em',marginBottom:10}}>Databricks Genie</div>

        </div>
        <div style={{marginTop:12}}><span style={{background:'rgba(244,162,97,0.12)',color:'#F4A261',border:'1px solid rgba(244,162,97,0.3)',borderRadius:20,padding:'3px 10px',fontSize:10,fontWeight:700}}>AWAITING</span></div>

      </div>
    );
  }
  const highPending = MARKETS.filter(m => day < m.lagDays && m.weight >= 0.10);
  return (
    <div style={{background:'rgba(13,24,48,0.9)',border:'1px solid rgba(0,180,216,0.15)',borderRadius:10,padding:20}}>
      <div style={{fontSize:10,color:'#00B4D8',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.12em',marginBottom:10}}>Databricks Genie</div>
      <div style={{fontSize:13,color:'#F0F4FA',lineHeight:1.9,fontStyle:'italic'}}>
        "Provisional EMEA MBR - <strong style={{color:'#F4A261'}}>{landed.length}/10 markets</strong> ({pct}% value weight). Group value sales €<strong style={{color:'#00B4D8'}}>{fmt(kpis.valueSales)}M</strong> ({pctArrow(pctChange(kpis.valueSales,kpis.valueSalesYA))}{Math.abs(pctChange(kpis.valueSales,kpis.valueSalesYA)).toFixed(1)}% vs YA). Wtd distribution {fmt(kpis.wtdDist)}%. Price/unit €{fmt(kpis.pricePerUnit,2)}.{highPending.length>0 ? ` ⚠ ${highPending.map(m=>m.name).join(', ')} still pending - final figures may move.` : ''}"
      </div>
      <div style={{marginTop:12,display:'flex',gap:8,flexWrap:'wrap'}}>
        <span style={{background:'rgba(0,180,216,0.12)',color:'#00B4D8',border:'1px solid rgba(0,180,216,0.3)',borderRadius:20,padding:'3px 10px',fontSize:10,fontWeight:700}}>PARTIAL - {landed.length}/10</span>
        {highPending.length > 0 && <span style={{background:'rgba(240,113,103,0.12)',color:'#F07167',border:'1px solid rgba(240,113,103,0.3)',borderRadius:20,padding:'3px 10px',fontSize:10,fontWeight:700}}>⚠ DRIFT RISK</span>}
      </div>
    </div>
  );
}

// ─── MAIN APP ────────────────────────────────────────────────────────────────
function App() {
  const [day, setDay] = useState(3);
  const [activeTab, setActiveTab] = useState('kpis'); // 'kpis' | 'markets' | 'release'

  const { landed, completeness, kpis, perMarket } = useMemo(() => computeKPIs(day), [day]);
  const completePct = Math.round(completeness * 100);
  const isProvisional = completeness < 0.98 && completeness > 0;

  // Build group-level sparkline from landed market data (approx)
  const groupSparkline = useMemo(() => {
    return [0,1,2,3,4,5].map(i => MARKETS.reduce((s,m) => s + SPARKLINES[m.id][i] * m.weight, 0) / TOTAL_WEIGHT * 10);
  }, []);
  const landedSparkline = useMemo(() => {
    if (landed.length === 0) return null;
    const w = landed.reduce((s,m)=>s+m.weight,0);
    return [0,1,2,3,4,5].map(i => landed.reduce((s,m) => s + SPARKLINES[m.id][i] * m.weight, 0) / w * 10);
  }, [landed]);

  const tabStyle = (t) => ({
    padding:'8px 18px', fontSize:12, fontWeight:600, cursor:'pointer',
    background:'transparent', border:'none', borderBottom: activeTab===t ? '2px solid #00B4D8' : '2px solid transparent',
    color: activeTab===t ? '#00B4D8' : '#4A6A8A', transition:'all 0.15s'
  });

  return (
    <div style={{minHeight:'100vh',paddingBottom:48}}>

      {/* ── HEADER ── */}
      <div style={{background:'linear-gradient(160deg,#060D1C 0%,#0B1D3A 60%,#0a2040 100%)',borderBottom:'1px solid rgba(0,180,216,0.12)',padding:'28px 24px 24px'}}>
        <div style={{maxWidth:1160,margin:'0 auto'}}>
          <div style={{fontSize:10,color:'#00B4D8',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.2em',marginBottom:8}}>Netscribes × NIQ × Databricks</div>
          <div style={{display:'flex',alignItems:'flex-end',justifyContent:'space-between',flexWrap:'wrap',gap:12}}>
            <div>
              <h1 style={{fontSize:26,fontWeight:800,letterSpacing:'-0.02em',marginBottom:4}}>EMEA Release Console <span style={{color:'#1C3A5E',fontWeight:400}}>+</span> <span style={{color:'#00B4D8'}}>MBR Group KPIs</span></h1>
              <p style={{color:'#4A6A8A',fontSize:13}}>Scrub Day 0 → Day +13 - KPIs rebuild in real time as each market's data lands</p>
            </div>
            {/* Completeness pill */}
            <div style={{display:'flex',alignItems:'center',gap:10,background:'rgba(13,24,48,0.8)',border:`1px solid ${completePct>=90?'rgba(67,170,139,0.4)':completePct>0?'rgba(244,162,97,0.4)':'rgba(28,58,94,0.6)'}`,borderRadius:10,padding:'10px 16px'}}>
              <div>
                <div style={{fontSize:10,color:'#4A6A8A',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:2}}>Data Coverage</div>
                <div style={{fontSize:22,fontWeight:800,color:completePct>=90?'#43AA8B':completePct>0?'#F4A261':'#1C3A5E'}}>{completePct}%</div>
              </div>
              <div style={{width:48,height:48,position:'relative'}}>
                <svg viewBox="0 0 48 48" style={{transform:'rotate(-90deg)'}}>
                  <circle cx="24" cy="24" r="20" fill="none" stroke="rgba(255,255,255,0.05)" strokeWidth="4"/>
                  <circle cx="24" cy="24" r="20" fill="none"
                    stroke={completePct>=90?'#43AA8B':completePct>0?'#F4A261':'#1C3A5E'}
                    strokeWidth="4" strokeLinecap="round"
                    strokeDasharray={`${completePct * 1.257} 125.7`}
                    style={{transition:'stroke-dasharray 0.5s ease'}}/>
                </svg>
                <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:700,color:'#4A6A8A'}}>{landed.length}/10</div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div style={{maxWidth:1160,margin:'0 auto',padding:'20px 24px'}}>

        {/* ── SCRUBBER ── */}
        <div style={{background:'rgba(13,24,48,0.8)',border:'1px solid rgba(0,180,216,0.12)',borderRadius:12,padding:'18px 22px',marginBottom:20}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
            <div style={{display:'flex',alignItems:'baseline',gap:8}}>
              <span style={{fontSize:11,color:'#4A6A8A',fontWeight:600,textTransform:'uppercase',letterSpacing:'0.1em'}}>Period day</span>
              <span style={{fontSize:32,fontWeight:800,color:'#00B4D8',lineHeight:1}}>+{day}</span>
              <span style={{fontSize:12,color:'#4A6A8A'}}>from close</span>
              {day === 0 && <span style={{fontSize:11,color:'#4A6A8A',fontStyle:'italic'}}>Period just closed - no data yet</span>}
            </div>
            <div style={{display:'flex',gap:6}}>
              <button onClick={()=>setDay(d=>Math.max(0,d-1))}
                style={{background:'rgba(0,180,216,0.08)',border:'1px solid rgba(0,180,216,0.2)',color:'#00B4D8',padding:'5px 14px',borderRadius:6,cursor:'pointer',fontSize:12,fontWeight:600}}>◀</button>
              <button onClick={()=>setDay(d=>Math.min(13,d+1))}
                style={{background:'rgba(0,180,216,0.08)',border:'1px solid rgba(0,180,216,0.2)',color:'#00B4D8',padding:'5px 14px',borderRadius:6,cursor:'pointer',fontSize:12,fontWeight:600}}>▶</button>
            </div>
          </div>
          <div style={{position:'relative',padding:'0 0 4px'}}>
            <input type="range" min={0} max={13} value={day} onChange={e=>setDay(Number(e.target.value))}/>
            <div style={{position:'absolute',left:`${(SLA_DAY/13)*100}%`,top:-22,transform:'translateX(-50%)',fontSize:9,color:'#F07167',fontWeight:700,whiteSpace:'nowrap',pointerEvents:'none'}}>SLA D+{SLA_DAY}</div>
            <div style={{position:'absolute',left:`${(SLA_DAY/13)*100}%`,top:0,width:1,height:12,background:'#F07167',opacity:0.5,pointerEvents:'none'}}/>
          </div>
          <div style={{display:'flex',justifyContent:'space-between',marginTop:8,gap:4,flexWrap:'nowrap'}}>
            {Array.from({length:14},(_,i) => {
              const mLanding = MARKETS.find(m=>m.lagDays===i);
              return (
                <div key={i} style={{flex:1,textAlign:'center',cursor:'pointer'}} onClick={()=>setDay(i)}>
                  {mLanding && <div style={{fontSize:13,lineHeight:1,marginBottom:1}}>{mLanding.flag}</div>}
                  <div style={{fontSize:10,fontWeight: i===day?700:400,
                    color: i<day?'#43AA8B': i===day?'#00B4D8': i===SLA_DAY?'#F07167':'#374151'}}>+{i}</div>
                </div>
              );
            })}
          </div>
        </div>

        {/* ── TABS ── */}
        <div style={{display:'flex',borderBottom:'1px solid rgba(0,180,216,0.1)',marginBottom:20,gap:4}}>
          <button style={tabStyle('kpis')} onClick={()=>setActiveTab('kpis')}>Group MBR KPIs</button>
          <button style={tabStyle('markets')} onClick={()=>setActiveTab('markets')}>Market Breakdown</button>
          <button style={tabStyle('release')} onClick={()=>setActiveTab('release')}>Release Board</button>
        </div>

        {/* ══════════════════════ TAB: GROUP MBR KPIs ══════════════════════ */}
        {activeTab === 'kpis' && (
          <div>
            {/* Status banner */}
            {landed.length > 0 && completeness < 0.98 && (
              <div style={{background:'rgba(244,162,97,0.07)',border:'1px solid rgba(244,162,97,0.2)',borderRadius:8,padding:'10px 16px',marginBottom:16,display:'flex',alignItems:'center',gap:10}}>
                <span style={{fontSize:14}}>⚠</span>
                <span style={{fontSize:12,color:'#F4A261'}}>Provisional - {landed.length}/10 markets landed ({completePct}% value weight). KPIs will update as remaining markets arrive.</span>
              </div>
            )}
            {landed.length === 0 && (
              <div style={{background:'rgba(28,58,94,0.2)',border:'1px dashed rgba(28,58,94,0.6)',borderRadius:8,padding:'10px 16px',marginBottom:16,textAlign:'center'}}>
                <span style={{fontSize:12,color:'#374151'}}>Advance scrubber to Day +2 to see UK data land and KPIs populate</span>
              </div>
            )}

            {/* PRIMARY KPIs - top row */}
            <div style={{fontSize:10,color:'#4A6A8A',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:10}}>Value & Volume</div>
            <div className="kpi-grid" style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:20}}>
              <KPICard label="Group Value Sales" value={kpis?.valueSales} unit="€M"
                ya={kpis?.valueSalesYA} color="#00B4D8"
                sparkData={landedSparkline} isProvisional={isProvisional}/>
              <KPICard label="Value Sales Growth" value={kpis ? pctChange(kpis.valueSales,kpis.valueSalesYA) : null} unit="%"
                color={kpis ? pctColor(pctChange(kpis.valueSales,kpis.valueSalesYA)) : '#00B4D8'}
                isProvisional={isProvisional} format="dec"/>
              <KPICard label="Group Volume Sales" value={kpis?.volSales} unit="M units"
                ya={kpis?.volSalesYA} color="#48CAE4" isProvisional={isProvisional}/>
              <KPICard label="Volume Growth" value={kpis ? pctChange(kpis.volSales,kpis.volSalesYA) : null} unit="%"
                color={kpis ? pctColor(pctChange(kpis.volSales,kpis.volSalesYA)) : '#48CAE4'}
                isProvisional={isProvisional} format="dec"/>
            </div>

            {/* DISTRIBUTION */}
            <div style={{fontSize:10,color:'#4A6A8A',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:10}}>Distribution & Availability</div>
            <div className="kpi-grid" style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:20}}>
              <KPICard label="Numeric Distribution" value={kpis?.numDist} unit="% stores"
                color="#43AA8B" isProvisional={isProvisional}/>
              <KPICard label="Weighted Distribution" value={kpis?.wtdDist} unit="% wtd"
                color="#43AA8B" isProvisional={isProvisional}/>
              <KPICard label="APPS" value={kpis?.apps} unit="SKUs / store"
                color="#F9C74F" isProvisional={isProvisional} format="dec"
                tooltip="Average Products Per Store - depth of range"/>
              <KPICard label="SPPD" value={kpis ? kpis.sppd/1000 : null} unit="k€ / dist pt"
                ya={kpis ? kpis.sppdYA/1000 : null} color="#F9C74F"
                isProvisional={isProvisional} format="dec"
                tooltip="Sales Per Point of Distribution - velocity"/>
            </div>

            {/* PRICE & SHARE */}
            <div style={{fontSize:10,color:'#4A6A8A',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:10}}>Price & Market Share</div>
            <div className="kpi-grid" style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:24}}>
              <KPICard label="Price per Unit" value={kpis?.pricePerUnit} unit="€"
                ya={kpis?.pricePerUnitYA} color="#C3A6FF"
                isProvisional={isProvisional} format="dec2"/>
              <KPICard label="Price Inflation" value={kpis ? pctChange(kpis.pricePerUnit,kpis.pricePerUnitYA) : null} unit="%"
                color={kpis ? pctColor(pctChange(kpis.pricePerUnit,kpis.pricePerUnitYA)) : '#C3A6FF'}
                isProvisional={isProvisional} format="dec"/>
              <KPICard label="Value Share (avg)" value={kpis?.valueShare} unit="% cat"
                ya={kpis?.valueShareYA} color="#F07167"
                isProvisional={isProvisional}/>
              <KPICard label="Share Gain / Loss" value={kpis ? kpis.valueShare - kpis.valueShareYA : null} unit="pp"
                color={kpis ? pctColor(kpis.valueShare - kpis.valueShareYA) : '#F07167'}
                isProvisional={isProvisional} format="dec"/>
            </div>

            {/* VALUE CONTRIBUTION BAR */}
            <div style={{background:'rgba(13,24,48,0.8)',border:'1px solid rgba(0,180,216,0.12)',borderRadius:10,padding:'16px 20px',marginBottom:20}}>
              <div style={{fontSize:10,color:'#4A6A8A',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:12}}>Value Sales Contribution by Market</div>
              <ContribBar perMarket={perMarket}/>
            </div>

            {/* GENIE */}
            <GenieResponse day={day} completeness={completeness} landed={landed} kpis={kpis}/>
          </div>
        )}

        {/* ══════════════════════ TAB: MARKET BREAKDOWN ════════════════════ */}
        {activeTab === 'markets' && (
          <div>
            <div style={{background:'rgba(13,24,48,0.8)',border:'1px solid rgba(0,180,216,0.12)',borderRadius:10,padding:'18px 20px',marginBottom:16}}>
              <div style={{fontSize:10,color:'#4A6A8A',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:14}}>
                All Markets - {landed.length} landed, {MARKETS.length - landed.length} pending
              </div>
              <MarketTable perMarket={perMarket}/>
            </div>

            {/* Per-market sparklines */}
            <div style={{fontSize:10,color:'#4A6A8A',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:10}}>Value Sales Trend (6 periods)</div>
            <div className="kpi-grid" style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:10}}>
              {MARKETS.map(m => {
                const isLanded = day >= m.lagDays;
                const d = MARKET_DATA[m.id];
                const chg = pctChange(d.valueSales, d.valueSalesYA);
                return (
                  <div key={m.id} style={{
                    background:'rgba(13,24,48,0.9)',
                    border:`1px solid ${isLanded?'rgba(0,180,216,0.2)':'rgba(28,58,94,0.4)'}`,
                    borderRadius:8,padding:'12px 14px',opacity:isLanded?1:0.4,transition:'opacity 0.4s ease'
                  }}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                      <span style={{fontSize:13}}>{m.flag}</span>
                      <span style={{fontSize:9,fontWeight:700,color:statusColor(getStatus(m,day)),textTransform:'uppercase'}}>{getStatus(m,day)}</span>
                    </div>
                    <div style={{fontSize:11,fontWeight:600,marginBottom:2,color:isLanded?'#F0F4FA':'#374151'}}>{m.name}</div>
                    {isLanded ? (
                      <>
                        <div style={{fontSize:14,fontWeight:800,color:'#00B4D8',marginBottom:2}}>€{fmt(d.valueSales)}M</div>
                        <div style={{fontSize:10,color:pctColor(chg),fontWeight:600,marginBottom:6}}>{pctArrow(chg)}{Math.abs(chg).toFixed(1)}% vs YA</div>
                        <Sparkline data={SPARKLINES[m.id]} color={chg>=0?'#43AA8B':'#F07167'} width={100} height={28}/>
                      </>
                    ) : (
                      <div style={{fontSize:10,color:'#374151',marginTop:4}}>D+{m.lagDays} · {m.weight*100}% weight</div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* ══════════════════════ TAB: RELEASE BOARD ═══════════════════════ */}
        {activeTab === 'release' && (
          <div>
            <div className="main-grid" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}}>
              {/* Arrival board */}
              <div style={{background:'rgba(13,24,48,0.8)',border:'1px solid rgba(0,180,216,0.12)',borderRadius:12,padding:'18px 20px'}}>
                <div style={{fontSize:10,color:'#00B4D8',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:14}}>Market Arrival Board</div>
                {MARKETS.map(m => {
                  const status = getStatus(m, day);
                  const sc = statusColor(status);
                  const baseHour = 8 + m.utcOffset;
                  return (
                    <div key={m.id} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 0',borderBottom:'1px solid rgba(255,255,255,0.03)'}}>
                      <span style={{fontSize:18,width:24,flexShrink:0}}>{m.flag}</span>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:13,fontWeight:500}}>{m.name}</div>
                        <div style={{fontSize:10,color:'#4A6A8A'}}>{m.freq} · D+{m.lagDays} · {String(baseHour%24).padStart(2,'0')}:30 {m.tz}</div>
                      </div>
                      <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:2,flexShrink:0}}>
                        <span style={{fontSize:9,fontWeight:700,color:sc,textTransform:'uppercase'}}>{status}</span>
                        <span style={{fontSize:9,color:'#374151'}}>{(m.weight*100).toFixed(0)}% wt</span>
                      </div>
                      <div style={{width:6,height:6,borderRadius:'50%',background:sc,flexShrink:0}}/>
                    </div>
                  );
                })}
              </div>

              {/* Stats + completeness */}
              <div style={{display:'flex',flexDirection:'column',gap:12}}>
                <div style={{background:'rgba(13,24,48,0.8)',border:'1px solid rgba(0,180,216,0.12)',borderRadius:12,padding:'18px 20px',flex:1}}>
                  <div style={{fontSize:10,color:'#00B4D8',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:14}}>Group Rollup Status</div>
                  <div style={{marginBottom:14}}>
                    <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
                      <span style={{fontSize:12,color:'#4A6A8A'}}>Coverage (value weight)</span>
                      <span style={{fontSize:13,fontWeight:700,color:completePct>=90?'#43AA8B':completePct>=50?'#F4A261':'#F07167'}}>{completePct}%</span>
                    </div>
                    <div style={{background:'rgba(255,255,255,0.05)',borderRadius:4,height:8,overflow:'hidden'}}>
                      <div style={{width:`${completePct}%`,height:'100%',background:completePct>=90?'#43AA8B':completePct>=50?'#F4A261':'#F07167',borderRadius:4,transition:'width 0.5s ease'}}/>
                    </div>
                  </div>
                  {kpis ? (
                    <div style={{background:'rgba(0,180,216,0.06)',border:'1px solid rgba(0,180,216,0.15)',borderRadius:8,padding:'12px',marginBottom:12}}>
                      <div style={{fontSize:10,color:'#4A6A8A',marginBottom:3}}>EMEA Value Sales</div>
                      <div style={{fontSize:28,fontWeight:800,color:'#00B4D8'}}>€{fmt(kpis.valueSales)}M</div>
                      <div style={{fontSize:10,color:'#4A6A8A',marginTop:2}}>{landed.length} markets · {isProvisional?'provisional':'confirmed'}</div>
                    </div>
                  ) : (
                    <div style={{background:'rgba(255,255,255,0.02)',border:'1px dashed rgba(28,58,94,0.5)',borderRadius:8,padding:'12px',marginBottom:12,textAlign:'center'}}>
                      <div style={{fontSize:12,color:'#374151'}}>No data landed</div>
                    </div>
                  )}
                  {kpis && MARKETS.filter(m=>day<m.lagDays&&m.weight>=0.10).length>0 && (
                    <div style={{background:'rgba(240,113,103,0.07)',border:'1px solid rgba(240,113,103,0.2)',borderRadius:8,padding:'10px 12px'}}>
                      <div style={{fontSize:11,color:'#F07167',fontWeight:600,marginBottom:3}}>⚠ Drift Warning</div>
                      <div style={{fontSize:11,color:'#64748B',lineHeight:1.6}}>
                        {MARKETS.filter(m=>day<m.lagDays&&m.weight>=0.10).map(m=>m.name).join(' & ')} pending ({(MARKETS.filter(m=>day<m.lagDays&&m.weight>=0.10).reduce((s,m)=>s+m.weight,0)*100).toFixed(0)}% weight). Final KPIs may shift &gt;1.5%.
                      </div>
                    </div>
                  )}
                </div>
                <div style={{background:'rgba(13,24,48,0.8)',border:'1px solid rgba(0,180,216,0.12)',borderRadius:12,padding:'14px 20px'}}>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,textAlign:'center'}}>
                    <div>
                      <div style={{fontSize:20,fontWeight:800,color:'#43AA8B'}}>{landed.length}</div>
                      <div style={{fontSize:10,color:'#4A6A8A',textTransform:'uppercase',letterSpacing:'0.06em'}}>Landed</div>
                    </div>
                    <div>
                      <div style={{fontSize:20,fontWeight:800,color:'#F4A261'}}>{MARKETS.filter(m=>day<m.lagDays&&m.lagDays<=SLA_DAY).length}</div>
                      <div style={{fontSize:10,color:'#4A6A8A',textTransform:'uppercase',letterSpacing:'0.06em'}}>Pending</div>
                    </div>
                    <div>
                      <div style={{fontSize:20,fontWeight:800,color:'#F07167'}}>{MARKETS.filter(m=>m.lagDays>SLA_DAY).length}</div>
                      <div style={{fontSize:10,color:'#4A6A8A',textTransform:'uppercase',letterSpacing:'0.06em'}}>At Risk</div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
            <GenieResponse day={day} completeness={completeness} landed={landed} kpis={kpis}/>
          </div>
        )}

        {/* FOOTER */}
        <div style={{marginTop:24,fontSize:10,color:'#1C3A5E',textAlign:'center',lineHeight:1.8}}>
          Netscribes × NIQ × Databricks · EMEA MBR Console · Weighted by value contribution, not market count<br/>
          In production: lagDays ← _meta.release_log · weights ← market_weights view (last complete period) · KPIs ← niq_group.semantic.sales_normalised
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
